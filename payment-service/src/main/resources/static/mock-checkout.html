<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Test Checkout (Mock)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .checkout-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(50,50,93,.11), 0 1px 3px rgba(0,0,0,.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #32325d;
            margin-bottom: 20px;
        }
        .amount {
            font-size: 32px;
            font-weight: bold;
            color: #32325d;
            margin-bottom: 30px;
        }
        .btn-pay {
            background-color: #5469d4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-pay:hover {
            background-color: #4454b2;
        }
        .info {
            font-size: 14px;
            color: #8898aa;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Stripe Test Checkout</h2>
    <div class="info">This is a mocked checkout page to bypass Stripe API key requirements for local testing.</div>
    <div class="amount" id="amountDisplay">$0.00</div>
    <button class="btn-pay" id="payBtn">Pay with Dummy Card</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('ticketId');
    const invoiceId = urlParams.get('invoiceId');
    const email = urlParams.get('email');
    const amount = urlParams.get('amount') || 0;

    document.getElementById('amountDisplay').innerText = `$${parseFloat(amount).toFixed(2)}`;

    document.getElementById('payBtn').addEventListener('click', () => {
        window.location.href = `/api/payments/success?ticketId=${ticketId}&invoiceId=${invoiceId}&email=${email}`;
    });
</script>

</body>
</html>
